name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # JDK must be ready before any Gradle/Android tooling runs
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          npm ci
          # package-lock.json was generated on Windows so it locked the Windows
          # native binding for @tailwindcss/oxide. Explicitly install the Linux one.
          OXIDE_VERSION=$(node -e "console.log(require('./node_modules/@tailwindcss/oxide/package.json').version)")
          npm install --no-save "@tailwindcss/oxide-linux-x64-gnu@$OXIDE_VERSION"

      # Build only the Vite frontend — the Express server is not needed in the APK
      - name: Build web assets
        run: npx vite build

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # Create config file directly — avoids interactive prompts from `npx cap init`
      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.pakpaisa.app",
            "appName": "PakPaisa",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform and sync
        run: |
          npx cap add android
          npx cap sync android

      # Gradle 8.2.1 (default in Capacitor) ships ASM 9.5 which chokes on
      # Java-21-compiled classes inside bcprov-jdk18on-1.79.jar (class version 65).
      # Upgrade wrapper to 8.7 which bundles ASM 9.6 with Java 21 support.
      - name: Upgrade Gradle wrapper to 8.7
        run: |
          sed -i 's|gradle-[0-9.]*-all.zip|gradle-8.7-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      # Accept SDK licenses non-interactively so Gradle doesn't abort
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          # Clear any stale Gradle JAR/transform caches that cause bcprov corruption
          rm -rf ~/.gradle/caches
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PakPaisa-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7